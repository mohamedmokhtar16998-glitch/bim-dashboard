<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>BIM WOW - Mohamed Mokhtar Live Dashboard</title>
    <!-- استدعاء الخطوط والـ Icons الاحترافية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #0b0f19; 
            margin: 0;
            padding: 40px 20px;
            color: #e2e8f0; 
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 🎬 جعل الفيديو الخلفي يملأ الشاشة بالكامل */
        .full-screen-video-bg {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2;
            object-fit: cover;
            pointer-events: none;
        }

        /* طبقة حماية داكنة على الشاشة بالكامل لتوضيح النصوص */
        .full-screen-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(11, 15, 25, 0.75) 0%, rgba(7, 10, 19, 0.93) 100%);
            z-index: -1;
        }

        /* 🏢 تصميم الهيدر المدمج الشفاف */
        .user-header {
            max-width: 850px; 
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 25px; 
            border-radius: 16px 16px 0 0;
            background: rgba(17, 22, 37, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: none;
            box-sizing: border-box;
        }

        .user-info { display: flex; flex-direction: column; }
        .user-name-glow { color: #ffffff; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .user-name-glow i { color: #4a72b2; font-size: 15px; filter: drop-shadow(0 0 3px #4a72b2); }
        .glow-line { width: 100%; height: 2px; background: #4a72b2; box-shadow: 0 0 8px #4a72b2; border-radius: 2px; }

        .company-logo-box { text-align: right; }
        .company-title { font-size: 28px; font-weight: 300; color: #ffffff; margin: 0; letter-spacing: 1px; line-height: 1; }
        .company-title font { font-weight: bold; }
        .company-sub-title { font-size: 10px; color: #8fa0bc; font-weight: 700; letter-spacing: 1.5px; margin: 4px 0 0 0; text-transform: uppercase; }

        /* شريط التنقل الزجاجي */
        .nav-tabs { 
            max-width: 850px; 
            margin: 0 auto; 
            display: flex; 
            background: rgba(17, 22, 37, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 5px 25px; 
            gap: 10px; 
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            box-sizing: border-box;
        }
        .tab-btn {
            background: rgba(24, 31, 50, 0.5); color: #8fa0bc; border: 1px solid rgba(255, 255, 255, 0.05); padding: 8px 18px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: all 0.25s ease;
        }
        .tab-btn:hover, .tab-btn.active { background: #4a72b2; color: #ffffff; border-color: #4a72b2; box-shadow: 0 0 10px rgba(74, 114, 178, 0.3); }

        .auth-buttons-wrapper { display: flex; gap: 8px; margin-top: 12px; }
        .login-btn {
            background: rgba(29, 39, 59, 0.6); color: #8fa0bc; border: 1px solid rgba(255, 255, 255, 0.05); padding: 5px 12px; border-radius: 4px; font-size: 11px;
            cursor: pointer; font-weight: 600; transition: all 0.25s ease;
        }
        .login-btn:hover { background: #4a72b2; color: #fff; border-color: #4a72b2; }
        .manager-active-btn { background-color: rgba(241, 196, 15, 0.2); color: #f1c40f; border-color: rgba(241, 196, 15, 0.4); }
        .admin-active-btn { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; border-color: rgba(46, 204, 113, 0.4); }

        /* 🔮 لوحة التحكم الزجاجية الشفافة الفخمة */
        .container { 
            max-width: 850px; 
            background: rgba(17, 22, 37, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            margin: 0 auto; 
            padding: 30px; 
            border-radius: 0 0 16px 16px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: none;
            box-sizing: border-box;
        }
        
        h1 { text-align: center; color: #ffffff; margin-bottom: 35px; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
        h1 i { color: #4a72b2; margin-right: 8px; }

        /* صندوق إضافة الحالات */
        .add-task-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .add-task-box input, .add-task-box select, .add-task-box button {
            padding: 12px; border: 1px solid rgba(255, 255, 255, 0.08); background-color: rgba(24, 31, 50, 0.7); color: white; border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box; width: 100%; font-family: inherit;
        }
        .add-task-box input:focus, .add-task-box select:focus { border-color: #4a72b2; background-color: #1d273b; }
        .add-task-box input::placeholder { color: #5c6e8c; }
        .add-task-box button { background-color: #4a72b2; border: none; cursor: pointer; font-size: 14px; font-weight: 600; grid-column: span 2; margin-top: 5px; }
        .add-task-box button:hover { background-color: #365991; }

        .task-list { list-style: none; padding: 0; margin: 0; }

        /* الكروت الشفافة */
        .task-item {
            display: flex; align-items: center; justify-content: space-between; background: rgba(24, 31, 50, 0.6); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.03); transition: all 0.25s;
        }
        .task-item:hover { transform: translateY(-2px); background: rgba(29, 39, 59, 0.8); }

        .priority-high { border-left-color: #e74c3c; }   
        .priority-medium { border-left-color: #f1c40f; } 
        .priority-low { border-left-color: #2ecc71; }    

        .task-content-details { flex: 1; margin-left: 10px; }
        .project-badge { font-size: 10px; background-color: rgba(29, 39, 59, 0.8); color: #4a72b2; padding: 3px 8px; border-radius: 4px; font-weight: 700; display: inline-block; margin-bottom: 5px; }
        .type-badge { font-size: 10px; background-color: rgba(40, 53, 79, 0.8); color: #ecf0f1; padding: 3px 8px; border-radius: 4px; font-weight: 700; display: inline-block; margin-bottom: 5px; margin-left: 5px; }
        .task-text { font-size: 14px; display: block; margin-top: 2px; font-weight: 500; color: #cbd5e1; }

        .task-item.status-100 { background-color: rgba(15, 20, 34, 0.4); opacity: 0.5; }
        .task-item.status-100 .task-text { text-decoration: line-through; color: #5c6e8c; }

        /* الدوائر الملونة للحالات */
        .status-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-right: 15px; width: 75px; flex-shrink: 0; }
        .progress-circle-container { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .progress-circle-container svg { width: 44px; height: 44px; transform: rotate(-90deg); position: absolute; }
        .progress-circle-container circle { cx: 22; cy: 22; r: 18; fill: none; stroke-width: 3.5; stroke-linecap: round; }
        .circle-bg { stroke: rgba(29, 39, 59, 0.8); }
        .circle-progress { stroke-dasharray: 114; stroke-dashoffset: 114; transition: all 0.5s ease; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes alertPulse { 0% { filter: drop-shadow(0 0 1px #e74c3c); } 100% { filter: drop-shadow(0 0 5px #e74c3c); } }
        
        .status-0 .circle-progress { stroke: #e74c3c; stroke-dashoffset: 105; animation: alertPulse 0.8s ease-in-out infinite alternate; }
        .status-0 .circle-icon, .status-0 .status-label-text { color: #e74c3c; }

        .status-50 .circle-progress { stroke: #f1c40f; stroke-dashoffset: 57; }
        .status-50 .circle-icon { color: #f1c40f; animation: spin 3s linear infinite; }
        .status-50 .status-label-text { color: #f1c40f; }

        @keyframes doneGlow { 0% { filter: drop-shadow(0 0 1px #2ecc71); } 100% { filter: drop-shadow(0 0 6px #2ecc71); } }
        .status-100 .circle-progress { stroke: #2ecc71; stroke-dashoffset: 0; animation: doneGlow 1s ease-in-out infinite alternate; }
        .status-100 .circle-icon, .status-100 .status-label-text { color: #2ecc71; }

        .circle-icon { font-size: 12px; z-index: 2; pointer-events: none; }
        .status-label-text { font-weight: 700; font-size: 9px; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.3px; text-align: center; }

        /* منطقة الأزرار والـ Select */
        .task-actions { display: flex; align-items: center; gap: 10px; }
        .task-actions button { background: none; border: none; font-size: 18px; cursor: pointer; }
        .task-actions .done-btn { color: #4a72b2; } 
        .task-actions .delete-btn { color: #e74c3c; }

        .inline-priority-select {
            background-color: rgba(24, 31, 50, 0.9); color: #cbd5e1; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; padding: 5px 8px; font-size: 12px; font-weight: 600; outline: none; cursor: pointer; font-family: inherit;
        }
        .inline-priority-select option { background-color: #111625; color: white; }
        
        /* شارة نصية ثابتة للفيور مريحة جداً للعين بدل السلكت */
        .viewer-priority-badge {
            font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; background-color: rgba(255,255,255,0.04); color: #cbd5e1;
        }

        /* الجداول الزجاجية الشفافة */
        .matrix-table-container { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.06); }
        .matrix-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; background: rgba(17, 22, 37, 0.3); }
        .matrix-table th, .matrix-table td { padding: 14px 16px; border: 1px solid rgba(255, 255, 255, 0.06); vertical-align: middle; }
        .matrix-table th { background-color: rgba(22, 28, 42, 0.7); color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .matrix-table th.check-item-head { background-color: rgba(24, 39, 31, 0.6); color: #a3c9a8; }
        .matrix-table td.check-item-name { background-color: rgba(19, 24, 36, 0.4); color: #cbd5e1; font-weight: 500; font-size: 13px; line-height: 1.4; }
        .matrix-table td.check-item-name span { font-family: 'Roboto Mono', monospace; font-size: 12px; color: #3498db; }

        /* كبسولات الماتريكس المطورة بالخمس حالات الكاملة */
        .status-badge { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 0; border-radius: 20px; font-weight: 700; font-size: 11px; width: 145px; text-transform: capitalize; box-sizing: border-box; text-align: center; border: 1px solid transparent; }
        .matrix-select-wrapper { position: relative; width: 145px; display: inline-block; }
        
        .matrix-hidden-select {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; font-size: 14px;
        }

        .badge-complete { background-color: rgba(46, 204, 113, 0.15); color: #2ecc71; border-color: rgba(46, 204, 113, 0.4); }
        .badge-progress { background-color: rgba(155, 89, 182, 0.2); color: #d6b4fc; border-color: rgba(155, 89, 182, 0.4); }
        .badge-notdone { background-color: rgba(231, 76, 60, 0.15); color: #e74c3c; border-color: rgba(231, 76, 60, 0.4); }
        .badge-rfi { background-color: rgba(241, 196, 15, 0.15); color: #f1c40f; border-color: rgba(241, 196, 15, 0.4); }
        .badge-needcheck { background-color: rgba(230, 126, 34, 0.15); color: #e67e22; border-color: rgba(230, 126, 34, 0.4); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 🎬 عنصر الفيديو الخلفي الممتد بكامل الشاشة -->
    <video class="full-screen-video-bg" autoplay loop muted playsinline>
        <source src="company_video.mp4" type="video/mp4">
    </video>
    <div class="full-screen-overlay"></div>

    <!-- الهيدر المدمج الشفاف -->
    <div class="user-header">
        <div class="user-info">
            <div class="user-name-glow"><i class="fa-solid fa-gears"></i> Mohamed Mokhtar</div>
            <div class="glow-line"></div>
            <!-- 🛠️ تم فصل أزرار الدخول لنظام الأدمن ونظام المدير المنفصلين -->
            <div class="auth-buttons-wrapper">
                <button id="admin-login-btn" class="login-btn" onclick="handleAdminLogin()">Admin Login</button>
                <button id="manager-login-btn" class="login-btn" onclick="handleManagerLogin()">Manager Login</button>
            </div>
        </div>
        <div class="company-logo-box">
            <h2 class="company-title">BIM<font>WOW</font></h2>
            <div class="company-sub-title">Design.Build.Operate</div>
        </div>
    </div>

    <!-- شريط التنقل الشفاف -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tasks-page', this)"><i class="fa-solid fa-list-check"></i> My Tasks</button>
        <button class="tab-btn" onclick="switchTab('status-page', this)"><i class="fa-solid fa-table-list"></i> Projects Matrix</button>
    </div>

    <!-- اللوحة الزجاجية الرئيسية -->
    <div class="container">
        
        <div id="tasks-page">
            <h1><i class="fa-solid fa-folder-tree"></i> Projects Task Tracker</h1>
            <div class="add-task-box" id="admin-box">
                <select id="project-input">
                    <option value="BRENT ELEMENTARY SCHOOL">🏫 Brent Elementary School</option>
                    <option value="GOODWILL">🏢 GoodWill</option>
                    <option value="PWC FIRE STATION">🚒 PWC Fire Station</option>
                    <option value="ARFF">✈️ ARFF</option>
                </select>
                <select id="type-input">
                    <option value="Reply to Email">📧 Reply to Email</option>
                    <option value="Modeling">🏗️ Modeling</option>
                    <option value="Coordination">🔄 Coordination</option>
                    <option value="Shop Drawing">📜 Shop Drawing</option>
                    <option value="Sleeve Drawing">🕳️ Sleeve Drawing</option>
                    <option value="Submittal Check">✅ Submittal Check</option>
                    <option value="RFI">❓ RFI</option>
                </select>
                <input type="text" id="task-input" placeholder="Notes / Task Details...">
                <select id="priority-input">
                    <option value="high">🔥 High Priority</option>
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="low">🟢 Low Priority</option>
                </select>
                <button onclick="addNewTask()"><i class="fa-solid fa-plus"></i> Add Task</button>
            </div>
            <ul class="task-list" id="task-list-container"></ul>
        </div>

        <div id="status-page" class="hidden">
            <h1><i class="fa-solid fa-table"></i> QA/QC Projects Checklist Matrix</h1>
            <div class="matrix-table-container">
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th class="check-item-head" style="width: 42%;">Check Item</th>
                            <th style="width: 19%;">(ARFF) Station 47</th>
                            <th style="width: 19%;">PWC Fire Station</th>
                            <th style="width: 20%;">GoodWill</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-tbody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const ADMIN_PASSWORD = "Crazymoney98$";
        const MANAGER_PASSWORD = "ManagerWow2026"; // 🔐 الباسوورد الخاص بمديرك للـ Priority فقط
        const FIREBASE_BASE_URL = "https://bimwowdashboard-default-rtdb.firebaseio.com/";
        
        let userRole = sessionStorage.getItem('bimUserRole') || 'viewer'; // 'admin', 'manager', 'viewer'
        let tasks = [];
        let matrixData = {};

        const checkItemsList = [
            "Pipe Insulation", "P-Trap at Drains", "Pipes in Concrete Walls",
            "Raise UG Drain Network to Highest Possible Elevation", "Floor Drain Branch ≤ 2'-0\"",
            "Required RFIs Prepared", "Equipment Clearance &Accessibility Verification",
            "Supports, Fixation", "Modeling", "Coordination"
        ];

        function switchTab(pageId, btnElement) {
            document.getElementById('tasks-page').classList.add('hidden');
            document.getElementById('status-page').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.remove('hidden');
            btnElement.classList.add('active');
        }

        // دالة فحص وتأمين المستويات التلاتة بالملّي
        function checkPermissions() {
            const adminBox = document.getElementById('admin-box');
            const adminBtn = document.getElementById('admin-login-btn');
            const managerBtn = document.getElementById('manager-login-btn');
            
            // إعادة تصفير الستايلز للأزرار
            adminBtn.innerText = "Admin Login"; adminBtn.className = "login-btn";
            managerBtn.innerText = "Manager Login"; managerBtn.className = "login-btn";
            if(adminBox) adminBox.classList.add('hidden');

            if (userRole === 'admin') {
                if(adminBox) adminBox.classList.remove('hidden');
                adminBtn.innerText = "Logout Admin";
                adminBtn.className = "login-btn admin-active-btn";
            } else if (userRole === 'manager') {
                managerBtn.innerText = "Logout Manager";
                managerBtn.className = "login-btn manager-active-btn";
            }
            renderAll();
        }

        function handleAdminLogin() {
            if (userRole === 'admin') {
                sessionStorage.setItem('bimUserRole', 'viewer');
                userRole = 'viewer';
            } else {
                let pass = prompt("Enter Admin Password:");
                if (pass === ADMIN_PASSWORD) {
                    sessionStorage.setItem('bimUserRole', 'admin');
                    userRole = 'admin';
                } else if (pass !== null) { alert("Wrong Password!"); }
            }
            checkPermissions();
        }

        function handleManagerLogin() {
            if (userRole === 'manager') {
                sessionStorage.setItem('bimUserRole', 'viewer');
                userRole = 'viewer';
            } else {
                let pass = prompt("Enter Manager Password:");
                if (pass === MANAGER_PASSWORD) {
                    sessionStorage.setItem('bimUserRole', 'manager');
                    userRole = 'manager';
                } else if (pass !== null) { alert("Wrong Password!"); }
            }
            checkPermissions();
        }

        async function fetchLiveCloudData() {
            try {
                let tResponse = await fetch(`${FIREBASE_BASE_URL}/tasks.json`);
                let tData = await tResponse.json();
                tasks = tData ? Object.keys(tData).map(key => ({id: key, ...tData[key]})) : [];
                
                let mResponse = await fetch(`${FIREBASE_BASE_URL}/matrix.json`);
                let mData = await mResponse.json();
                
                if (mData) {
                    matrixData = mData;
                } else {
                    checkItemsList.forEach(item => {
                        matrixData[item] = { arff: "progress", pwc: "progress", goodwill: "progress" };
                    });
                }
                renderAll();
            } catch (e) { console.error("Error loading live data: ", e); }
        }

        function renderAll() {
            renderTasks();
            renderMatrix();
        }

        function renderTasks() {
            const priorityOrder = { 'high': 1, 'medium': 2, 'low': 3 };
            tasks.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
            
            const container = document.getElementById('task-list-container');
            container.innerHTML = '';

            tasks.forEach((task) => {
                const li = document.createElement('li');
                li.className = `task-item priority-${task.priority} status-${task.progress}`;
                
                // أزرار الحالة والحذف تفتح حصرياً للأدمن فقط
                const adminStatusAndDelHtml = (userRole === 'admin') ? `
                    <button class="done-btn" onclick="cycleProgress('${task.id}', ${task.progress})" title="Change Status"><i class="fa-solid fa-rotate"></i></button>
                    <button class="delete-btn" onclick="deleteTask('${task.id}')" title="Delete Task"><i class="fa-solid fa-trash-can"></i></button>
                ` : '';

                // قائمة التحكم بالأولوية تفتح للأدمن وللمدير فقط! الفيور العادي تظهر له كـ شارة نصية ثابتة ومحمية
                let priorityControlHtml = '';
                if (userRole === 'admin' || userRole === 'manager') {
                    priorityControlHtml = `
                        <select class="inline-priority-select" onchange="changePriorityDirect('${task.id}', this.value)" title="Change Priority">
                            <option value="high" ${task.priority === 'high' ? 'selected' : ''}>🔥 High</option>
                            <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>🟡 Med</option>
                            <option value="low" ${task.priority === 'low' ? 'selected' : ''}>🟢 Low</option>
                        </select>
                    `;
                } else {
                    let pEmoji = task.priority === 'high' ? '🔥 ' : task.priority === 'medium' ? '🟡 ' : '🟢 ';
                    priorityControlHtml = `<span class="viewer-priority-badge">${pEmoji}${task.priority}</span>`;
                }

                li.innerHTML = `
                    <div class="task-content-details">
                        <span class="project-badge">${task.project}</span>
                        <span class="type-badge">${task.type}</span>
                        <span class="task-text">${task.details ? task.details : 'No extra notes'}</span>
                    </div>
                    <div class="status-wrapper">
                        <div class="progress-circle-container">
                            <svg><circle class="circle-bg"></circle><circle class="circle-progress"></circle></svg>
                            ${task.progress === 100 ? '<i class="fa-solid fa-check circle-icon"></i>' : task.progress === 50 ? '<i class="fa-solid fa-gear circle-icon"></i>' : '<i class="fa-regular fa-clock circle-icon"></i>'}
                        </div>
                        <div class="status-label-text">${task.progress === 100 ? 'COMPLETED' : task.progress === 50 ? 'IN PROGRESS' : 'PENDING'}</div>
                    </div>
                    <div class="task-actions">
                        ${priorityControlHtml}
                        ${adminStatusAndDelHtml}
                    </div>
                `;
                container.appendChild(li);
            });
        }

        function getStatusBadgeHtml(status, rowName, projectKey) {
            let className = ""; let text = ""; let icon = "";
            if (status === "complete") { className = "badge-complete"; text = "Complete"; icon = "✓ "; }
            if (status === "progress") { className = "badge-progress"; text = "In Progress"; icon = ""; }
            if (status === "notdone") { className = "badge-notdone"; text = "Not Done"; icon = "✗ "; }
            if (status === "rfi") { className = "badge-rfi"; text = "RFI Preparation"; icon = ""; }
            if (status === "needcheck") { className = "badge-needcheck"; text = "Need to Check Files"; icon = "⚠ "; }

            // جدول الماتريكس مقفول بالكامل عن الفيور وعن المدير، ولا يُعدل إلا بنظام الـ Admin الحصري
            if (userRole !== 'admin') {
                return `<span class="status-badge ${className}">${icon}${text}</span>`;
            }

            return `
                <div class="matrix-select-wrapper">
                    <span class="status-badge ${className}">${icon}${text}</span>
                    <select class="matrix-hidden-select" onchange="changeMatrixStatusDirect('${rowName}', '${projectKey}', this.value)">
                        <option value="complete" ${status === 'complete' ? 'selected' : ''}>Complete</option>
                        <option value="progress" ${status === 'progress' ? 'selected' : ''}>In Progress</option>
                        <option value="notdone" ${status === 'notdone' ? 'selected' : ''}>Not Done</option>
                        <option value="rfi" ${status === 'rfi' ? 'selected' : ''}>RFI Preparation</option>
                        <option value="needcheck" ${status === 'needcheck' ? 'selected' : ''}>Need to Check Files</option>
                    </select>
                </div>
            `;
        }

        function renderMatrix() {
            const tbody = document.getElementById('matrix-tbody');
            if(!tbody) return;
            tbody.innerHTML = '';

            checkItemsList.forEach(item => {
                const rowData = matrixData[item] || { arff: "progress", pwc: "progress", goodwill: "progress" };
                const tr = document.createElement('tr');
                let formattedItemName = item.replace(/(≤ 2'-0")/g, '<span>$1</span>');

                tr.innerHTML = `
                    <td class="check-item-name">${formattedItemName}</td>
                    <td>${getStatusBadgeHtml(rowData.arff, item, 'arff')}</td>
                    <td>${getStatusBadgeHtml(rowData.pwc, item, 'pwc')}</td>
                    <td>${getStatusBadgeHtml(rowData.goodwill, item, 'goodwill')}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addNewTask() {
            if (userRole !== 'admin') return;
            const project = document.getElementById('project-input').value;
            const type = document.getElementById('type-input').value;
            const details = document.getElementById('task-input').value;
            const priority = document.getElementById('priority-input').value;

            let newTask = { project, type, details, priority, progress: 0 };

            await fetch(`${FIREBASE_BASE_URL}/tasks.json`, {
                method: 'POST',
                body: JSON.stringify(newTask)
            });
            document.getElementById('task-input').value = '';
            fetchLiveCloudData();
        }

        async function cycleProgress(id, currentProgress) {
            if (userRole !== 'admin') return;
            let nextProgress = 0;
            if (currentProgress === 0) nextProgress = 50;
            else if (currentProgress === 50) nextProgress = 100;

            await fetch(`${FIREBASE_BASE_URL}/tasks/${id}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ progress: nextProgress })
            });
            fetchLiveCloudData();
        }

        // تغيير الأولوية متاح للأدمن وللمدير (Manager) فقط ومحمي تماماً عن الفيور العادي
        async function changePriorityDirect(id, selectedPriority) {
            if (userRole !== 'admin' && userRole !== 'manager') return;
            await fetch(`${FIREBASE_BASE_URL}/tasks/${id}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ priority: selectedPriority })
            });
            fetchLiveCloudData();
        }

        async function deleteTask(id) {
            if (userRole !== 'admin') return;
            await fetch(`${FIREBASE_BASE_URL}/tasks/${id}.json`, { method: 'DELETE' });
            fetchLiveCloudData();
        }

        async function changeMatrixStatusDirect(rowName, projectKey, selectedStatus) {
            if (userRole !== 'admin') return;

            if(!matrixData[rowName]) matrixData[rowName] = {};
            matrixData[rowName][projectKey] = selectedStatus;

            await fetch(`${FIREBASE_BASE_URL}/matrix/${rowName}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ [projectKey]: selectedStatus })
            });
            renderMatrix();
        }

        checkPermissions();
        fetchLiveCloudData();
    </script>
</body>
</html>
